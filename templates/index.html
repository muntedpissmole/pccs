<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>The Pissmole Camper Control System</title>
  
  <script src="/static/tailwind.min.js"></script>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/themes/glassmorphism.css">
  <link rel="stylesheet" href="/static/fontawesome/css/all.min.css">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <div class="flex-1 p-4 md:p-4 xl:p-4 space-y-4">
  
    <!-- OFFLINE OVERLAY -->
	<div id="offline-overlay" 
		 class="hidden fixed inset-0 bg-black/70 backdrop-blur-md z-50 flex items-center justify-center pointer-events-none">
			<div id="offline-banner" 
           class="text-white text-center py-6 px-10 rounded-2xl shadow-2xl flex items-center gap-5 text-lg font-medium tracking-wide mx-4"
           style="background: #f43f5e; width: 90%; max-width: 1024px; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.6);">
        <i class="fa-solid fa-circle-exclamation text-4xl animate-pulse"></i>
        <div class="flex-1 text-left">
          System Offline
          <div class="text-sm opacity-90 font-normal mt-0.5">Waiting to reconnect...</div>
        </div>
        <div class="w-7 h-7 border-2 border-white/40 border-t-white rounded-full animate-spin flex-shrink-0"></div>
      </div>
    </div>

    <!-- STATUS TILES -->
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4">
      <div class="tile neumorph p-5">
        <div class="flex justify-between items-start">
          <div>
            <p class="tile-label">Date</p>
            <p class="tile-value" id="tile-date">—</p>
          </div>
          <i class="fa-solid fa-calendar-days text-2xl accent-sky"></i>
        </div>
        <div class="mt-6">
          <div class="flex justify-between items-start">
            <div>
              <p class="tile-label">Time</p>
              <p class="tile-value" id="tile-time">—</p>
            </div>
            <i class="fa-solid fa-clock text-2xl accent-sky"></i>
          </div>
        </div>
      </div>

      <div class="tile neumorph p-5">
        <div class="flex justify-between items-start">
          <div>
            <p class="tile-label">Water</p>
            <p class="tile-value" id="water-level">—</p>
          </div>
          <i class="fa-solid fa-droplet text-2xl accent-sky"></i>
        </div>
        <div class="mt-6">
          <div class="flex justify-between items-start">
            <div>
              <p class="tile-label">Solar</p>
              <p class="tile-value" id="solar-input">—</p>
            </div>
            <i class="fa-solid fa-sun text-2xl accent-sky"></i>
          </div>
        </div>
      </div>

      <div class="tile neumorph p-5">
        <div class="flex justify-between items-start">
          <div>
            <p class="tile-label">Battery</p>
            <p class="tile-value" id="battery-voltage">—</p>
          </div>
          <i class="fa-solid fa-battery-three-quarters text-2xl accent-sky"></i>
        </div>
        <div class="mt-6">
          <div class="flex justify-between items-start">
            <div>
              <p class="tile-label">Charge</p>
              <p class="tile-value" id="battery-charge">—</p>
            </div>
            <i class="fa-solid fa-bolt text-2xl accent-sky"></i>
          </div>
        </div>
      </div>

      <div class="tile neumorph p-5">
        <div class="flex justify-between items-start">
          <div>
            <p class="tile-label">Sunrise</p>
            <p class="tile-value" id="sunrise">—</p>
          </div>
          <i class="fa-solid fa-sun text-2xl accent-sky"></i>
        </div>
        <div class="mt-6">
          <div class="flex justify-between items-start">
            <div>
              <p class="tile-label">Sunset</p>
              <p class="tile-value" id="sunset">—</p>
            </div>
            <i class="fa-solid fa-moon text-2xl accent-sky"></i>
          </div>
        </div>
      </div>

      <div class="tile neumorph p-5">
        <div class="flex justify-between items-start">
          <div>
            <p class="tile-label">Current Temp</p>
            <p class="tile-value" id="outside-temp">—°C</p>
          </div>
          <i class="fa-solid fa-temperature-half text-2xl accent-sky"></i>
        </div>
        <div class="mt-6">
          <div class="flex justify-between items-start">
            <div>
              <p class="tile-label">Min/Max</p>
              <div class="flex items-center gap-3">
                <p class="tile-value text-lg" id="temp-range">—° / —°</p>
              </div>
            </div>
            <i id="weather-icon" class="fa-solid fa-cloud text-2xl accent-sky"></i>
          </div>
        </div>
      </div>

      <div class="tile neumorph p-5">
        <div class="flex justify-between items-start">
          <div>
            <p class="tile-label">Satellites</p>
            <p class="tile-value" id="satellites">— / —</p>
          </div>
          <i class="fa-solid fa-satellite-dish text-2xl accent-sky"></i>
        </div>
        <div class="mt-6">
          <div class="flex justify-between items-start">
            <div>
              <p class="tile-label">Location</p>
              <p class="tile-value" id="location">---</p>
            </div>
            <i class="fa-solid fa-location-dot text-2xl accent-sky"></i>
          </div>
        </div>
      </div>
    </div>
	
    <!-- LIGHTING SCENES -->
    <div class="grid grid-cols-3 gap-4">
      <button data-scene="bedtime" class="scene-btn">
        <i class="fa-solid fa-bed"></i>
        <span>Bedtime</span>
      </button>
      <button data-scene="ensuite" class="scene-btn">
        <i class="fa-solid fa-bath"></i>
        <span>Bathroom</span>
      </button>
      <button data-scene="all_off" class="scene-btn">
        <i class="fa-solid fa-power-off"></i>
        <span>All Off</span>
      </button>
    </div>

    <!-- ALL LIGHTING CONTROLS -->
    <div id="lighting-controls" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-4">
    </div>

  </div>
  
  <!-- ====================== TOAST CONTAINER ====================== -->
  <div id="toast-container"></div>

<script src="/static/socket.io.min.js"></script>
<script>
    const socket = io();
	
	// ====================== LIVE DARK/LIGHT MODE ======================
	function applyDarkMode(mode) {
		const html = document.documentElement;
		
		html.classList.remove('dark', 'light');
		
		if (mode === 'light') {
			html.classList.add('light');
			html.setAttribute('data-theme', 'light');
		} else {
			html.classList.add('dark');
			html.removeAttribute('data-theme');
		}
		
		console.log(`🌗 Live mode switch → ${mode}`);
	}

	socket.on('global_dark_mode_update', function(data) {
		if (data && data.mode) {
			applyDarkMode(data.mode);
		}
	});

    let currentState = {};
    let currentModes = { kitchen_panel: 'white', awning: 'white' };
    let currentReeds = {};

    const currentlyDragging = new Set();
    const userJustSet = new Set();
    const JUST_SET_DURATION = 2800;

    // ==================== LIGHT CONFIG ====================
    const LIGHTS = [
      { name: "rooftop_tent",    label: "Rooftop Tent",   icon: "fa-tent" },
      { name: "kitchen_panel",   label: "Kitchen",        icon: "fa-utensils" },
      { name: "kitchen_bench",   label: "Kitchen Bench",  icon: "fa-mug-hot" },
      { name: "storage_panel",   label: "Storage Panel",  icon: "fa-boxes-stacked" },
      { name: "rear_drawer",     label: "Rear Drawer",    icon: "fa-archive" },
      { name: "accent",          label: "Accent",         icon: "fa-lightbulb" },
      { name: "awning",          label: "Awning",         icon: "fa-umbrella" },
      { name: "ensuite",         label: "Ensuite",        icon: "fa-bath" },
      { name: "floodlights",     label: "Floodlights",    icon: "fa-lightbulb", isRelay: true }
    ];

    // ==================== OFFLINE HANDLER ====================
    let offlineTimeout = null;

    function showOfflineBanner() {
        if (offlineTimeout) clearTimeout(offlineTimeout);
        offlineTimeout = setTimeout(() => {
            const overlay = document.getElementById('offline-overlay');
            if (overlay) {
                overlay.classList.remove('hidden');
                overlay.style.pointerEvents = 'auto';
            }
            const mainContent = document.querySelector('.flex-1');
            if (mainContent) mainContent.style.pointerEvents = 'none';
        }, 800);
    }

    function hideOfflineBanner() {
        if (offlineTimeout) clearTimeout(offlineTimeout);
        offlineTimeout = null;
        const overlay = document.getElementById('offline-overlay');
        if (overlay) overlay.classList.add('hidden');
        const mainContent = document.querySelector('.flex-1');
        if (mainContent) mainContent.style.pointerEvents = 'auto';
    }

    // ==================== SOCKET.IO ====================
    socket.on('connect', () => {
        console.log('✅ Backend connected');
        hideOfflineBanner();
        socket.emit('request_full_state');
    });

    socket.on('disconnect', () => {
        console.warn('❌ Backend disconnected');
        showOfflineBanner();
    });

    socket.on('connect_error', () => showOfflineBanner());

    // ==================== LIGHTING RENDERING ====================
    function renderLightingControls() {
        const container = document.getElementById('lighting-controls');
        
        container.innerHTML = LIGHTS.map(light => {
            if (light.isRelay) {
                return `
                    <div class="slider-card neumorph">
                        <div class="slider-card-header">
                            <div class="slider-card-left">
                                <div class="slider-card-title">
                                    <i class="fa-solid ${light.icon}"></i>
                                    <span class="slider-label">${light.label}</span>
                                </div>
                            </div>
                            <div class="slider-card-right">
                                <div class="relay-toggle" data-name="floodlights" data-state="off">
                                    <div class="relay-knob"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            return `
                <div class="slider-card neumorph">
                    <div class="slider-card-header">
                        <div class="slider-card-left">
                            <div class="slider-card-title">
                                <i class="fa-solid ${light.icon}"></i>
                                <span class="slider-label">${light.label}</span>
                            </div>
                        </div>
                        <div class="slider-card-right">
                            <div class="value-display" id="val-${light.name}">0%</div>
                            <div class="toggle-pill" data-name="${light.name}" data-state="off">
                                <div class="toggle-knob"></div>
                            </div>
                        </div>
                    </div>
                    <div class="slider-wrapper" data-name="${light.name}" data-value="0" data-last-brightness="100">
                        <div class="slider-inner">
                            <div class="slider-track"></div>
                            <div class="slider-fill" style="width: 0%"></div>
                            <div class="slider-thumb" style="left: 0%"></div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        initSliders();
        initToggleListeners();
    }

    // ==================== UNIFIED TOGGLE ====================
    function toggleControl(el) {
        const name = el.dataset.name;
        const wrapper = document.querySelector(`.slider-wrapper[data-name="${name}"]`);
        const currentBrightness = wrapper ? parseInt(wrapper.dataset.value) || 0 : 0;

        userJustSet.add(name);
        setTimeout(() => userJustSet.delete(name), JUST_SET_DURATION);

        if (name === 'floodlights') {
            const isOn = el.dataset.state === 'on';
            socket.emit('flood_change', { on: !isOn });
            return;
        }

        if (name !== 'kitchen_panel' && name !== 'awning') {
            const isOn = el.dataset.state === 'on';
            const newBrightness = isOn ? 0 : (parseInt(wrapper.dataset.lastBrightness) || 100);
            updateLightUI(name, newBrightness);
            socket.emit('light_change', { name, brightness: newBrightness });
            return;
        }

        // Colour toggle
        const newMode = currentModes[name] === 'white' ? 'red' : 'white';
        currentModes[name] = newMode;
        updateLightUI(name, currentBrightness);
        socket.emit('light_change', { name, brightness: currentBrightness, mode: newMode });
    }

    function initToggleListeners() {
        const container = document.getElementById('lighting-controls');
        container.addEventListener('click', (e) => {
            const toggle = e.target.closest('.toggle-pill, .relay-toggle');
            if (toggle) toggleControl(toggle);
        });
    }

	function updateLightUI(name, brightness) {
		const wrapper = document.querySelector(`.slider-wrapper[data-name="${name}"]`);

		if (wrapper) {
			const fill = wrapper.querySelector('.slider-fill');
			const thumb = wrapper.querySelector('.slider-thumb');
			const valueEl = document.getElementById(`val-${name}`);

			wrapper.dataset.value = brightness;
			wrapper.dataset.lastBrightness = brightness;

			if (fill) fill.style.width = `${brightness}%`;
			if (thumb) thumb.style.left = `${brightness}%`;
			if (valueEl) valueEl.textContent = `${brightness}%`;

			if (name === 'kitchen_panel' || name === 'awning') {
				const isRed = currentModes[name] === 'red';
				wrapper.classList.toggle('bug-mode', isRed);
				if (fill) fill.classList.toggle('bug-mode', isRed);
			}
		}

		const toggle = document.querySelector(`[data-name="${name}"]`);
		if (!toggle) return;

		if (name === 'floodlights') {
			toggle.classList.toggle('on', !!brightness);
			toggle.dataset.state = brightness ? 'on' : 'off';
		} 
		else if (name === 'kitchen_panel' || name === 'awning') {
			const isRed = currentModes[name] === 'red';
			toggle.classList.add('colour-toggle');
			toggle.classList.toggle('bug-mode', isRed);
			toggle.classList.toggle('on', isRed);
			toggle.classList.toggle('white-off', !isRed);
			toggle.dataset.state = isRed ? 'red' : 'white';
		} 
		else {
			const isOn = brightness > 0;
			toggle.classList.toggle('on', isOn);
			toggle.dataset.state = isOn ? 'on' : 'off';
		}
	}

    function updateUIFromState() {
        document.querySelectorAll('.slider-wrapper').forEach(wrapper => {
            const name = wrapper.dataset.name;
            if (currentlyDragging.has(name) || userJustSet.has(name)) return;
            updateLightUI(name, currentState[name] ?? 0);
        });

        if (currentState.floodlights !== undefined) {
            updateLightUI('floodlights', currentState.floodlights ? 100 : 0);
        }

        updateRooftopTentControls();
    }

	// ==================== DRAG LOGIC (Fixed multi-slider) ====================
	function makeDraggable(wrapper) {
		const inner = wrapper.querySelector('.slider-inner');
		const fill = wrapper.querySelector('.slider-fill');
		const thumb = wrapper.querySelector('.slider-thumb');
		const name = wrapper.dataset.name;
		const valueEl = document.getElementById(`val-${name}`);

		let isDragging = false;
		let lastSent = 0;

		function updatePosition(clientX) {
			const rect = inner.getBoundingClientRect();
			let percent = Math.max(0, Math.min(100, Math.round(((clientX - rect.left) / rect.width) * 100)));

			wrapper.dataset.value = percent;
			if (fill) fill.style.width = `${percent}%`;
			if (thumb) thumb.style.left = `${percent}%`;
			if (valueEl) valueEl.textContent = `${percent}%`;

			const now = Date.now();
			if (now - lastSent > 50) {
				lastSent = now;
				const payload = { name, brightness: percent };
				if ((name === 'kitchen_panel' || name === 'awning') && currentModes[name]) {
					payload.mode = currentModes[name];
				}
				socket.emit('light_change', payload);
			}
		}

		function startDrag() {
			if (isDragging) return;
			isDragging = true;
			wrapper.classList.add('dragging');
			currentlyDragging.add(name);
			userJustSet.delete(name);

			if (fill) fill.style.transition = 'none';
			if (thumb) thumb.style.transition = 'none';
		}

		function endDrag() {
			if (!isDragging) return;
			isDragging = false;
			wrapper.classList.remove('dragging');
			currentlyDragging.delete(name);

			const final = parseInt(wrapper.dataset.value) || 0;
			updateLightUI(name, final);

			userJustSet.add(name);
			setTimeout(() => userJustSet.delete(name), JUST_SET_DURATION);
		}

		// === TOUCH EVENTS ===
		wrapper.addEventListener('touchstart', e => {
			// Force reset any previous drag state
			isDragging = false;
		}, { passive: true });

		wrapper.addEventListener('touchmove', e => {
			if (e.touches.length === 0) return;
			const touch = e.touches[0];

			if (isDragging) {
				e.preventDefault();
				updatePosition(touch.clientX);
				return;
			}

			// Only start drag on this wrapper if we're already touching it
			// (no global tracking needed)
			const rect = wrapper.getBoundingClientRect();
			if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
				touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
				
				e.preventDefault();
				startDrag();
				updatePosition(touch.clientX);
			}
		}, { passive: false });

		wrapper.addEventListener('touchend', () => {
			endDrag();
		}, { passive: true });

		wrapper.addEventListener('touchcancel', () => {
			endDrag();
		}, { passive: true });

		// === MOUSE EVENTS ===
		wrapper.addEventListener('mousedown', e => {
			startDrag();
			updatePosition(e.clientX);

			const onMove = ev => updatePosition(ev.clientX);
			const onUp = () => {
				document.removeEventListener('mousemove', onMove);
				endDrag();
			};

			document.addEventListener('mousemove', onMove);
			document.addEventListener('mouseup', onUp, { once: true });
		});
	}

    function initSliders() {
        document.querySelectorAll('.slider-wrapper').forEach(makeDraggable);
    }

    // ==================== ROOFTOP TENT ====================
    function updateRooftopTentControls() {
        const tentCard = document.querySelector('.slider-wrapper[data-name="rooftop_tent"]')?.closest('.slider-card');
        if (!tentCard) return;
        
        const isClosed = !!currentReeds.rooftop_tent;
        
        if (isClosed) {
            tentCard.classList.add('rooftop-disabled');
            updateLightUI('rooftop_tent', 0);
        } else {
            tentCard.classList.remove('rooftop-disabled');
        }
    }

    // ==================== GPS, SENSORS, WEATHER ====================
    let lastGPSUpdate = 0;
    const GPS_TIMEOUT_MS = 60 * 1000;
    let lastWeatherUpdate = 0;
    const WEATHER_INTERVAL_MS = 3600 * 1000;
    let lastSuburb = "";

    function updateGPS(data) { 
        if (!data) return;
        lastGPSUpdate = Date.now();

        if (data.satellites !== undefined) {
            document.getElementById('satellites').textContent = `${data.satellites || 0} / ${data.fix_quality || 0}`;
        }

        const locationEl = document.getElementById('location');
        if (locationEl) {
            locationEl.textContent = (data.suburb && data.suburb.trim()) ? data.suburb.trim() : "No GPS Fix";
        }

        if (data.date) {
            const dateObj = new Date(data.date);
            if (!isNaN(dateObj.getTime())) {
                const dayName = dateObj.toLocaleDateString('en-AU', { weekday: 'short' });
                const day = dateObj.getDate();
                const month = dateObj.toLocaleDateString('en-AU', { month: 'short' });
                document.getElementById('tile-date').textContent = `${dayName} ${day} ${month}`;
            }
        }

        if (data.local_time) {
            const dateObj = new Date(`1970-01-01 ${data.local_time}`);
            if (!isNaN(dateObj.getTime())) {
                let hours = dateObj.getHours();
                const minutes = dateObj.getMinutes().toString().padStart(2, '0');
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                document.getElementById('tile-time').textContent = `${hours}:${minutes} ${ampm}`;
            }
        }

        const currentSuburb = (data.suburb || "").trim();
        if (data.latitude && data.longitude && 
            ((currentSuburb && currentSuburb !== lastSuburb) || 
             (Date.now() - lastWeatherUpdate > WEATHER_INTERVAL_MS))) {
            fetchWeatherForecast(data.latitude, data.longitude);
            lastWeatherUpdate = Date.now();
            if (currentSuburb) lastSuburb = currentSuburb;
        }

        if (data.sunrise) document.getElementById('sunrise').textContent = stripLeadingZero(data.sunrise);
        if (data.sunset)  document.getElementById('sunset').textContent  = stripLeadingZero(data.sunset);
    }

    function stripLeadingZero(timeStr) {
        return timeStr ? timeStr.replace(/^0(\d):/, '$1:') : "";
    }

    function updateClock() {
        if (Date.now() - lastGPSUpdate < GPS_TIMEOUT_MS) return;
        const now = new Date();
        const dayName = now.toLocaleDateString('en-AU', { weekday: 'short' });
        const day = now.getDate();
        const month = now.toLocaleDateString('en-AU', { month: 'short' });
        document.getElementById('tile-date').textContent = `${dayName} ${day} ${month} *`;

        let hours = now.getHours();
        let minutes = now.getMinutes().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        document.getElementById('tile-time').textContent = `${hours}:${minutes} ${ampm} *`;
    }

    function updateSensors(data) {
        if (data.water_percent !== undefined) document.getElementById('water-level').textContent = `${Math.round(data.water_percent)}%`;
        if (data.solar_kw !== undefined) document.getElementById('solar-input').textContent = `${data.solar_kw} kW`;
        if (data.battery_voltage !== undefined) document.getElementById('battery-voltage').textContent = `${parseFloat(data.battery_voltage).toFixed(1)}V`;
        if (data.battery_charge !== undefined) document.getElementById('battery-charge').textContent = `${Math.round(data.battery_charge)}%`;
        if (data.temp_c !== undefined && data.temp_c !== null) document.getElementById('outside-temp').textContent = `${Math.round(data.temp_c)}°C`;
    }

    async function fetchWeatherForecast(lat, lon) {
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&current_weather=true&timezone=auto`;
            const res = await fetch(url, { cache: 'no-store' });
            const data = await res.json();

            if (data.daily) {
                const max = Math.round(data.daily.temperature_2m_max[0]);
                const min = Math.round(data.daily.temperature_2m_min[0]);
                document.getElementById('temp-range').textContent = `${min}° / ${max}°`;
            }

            const weatherIcon = document.getElementById('weather-icon');
            if (data.current_weather && weatherIcon) {
                const code = data.current_weather.weathercode;
                const isDay = data.current_weather.is_day === 1;
                weatherIcon.className = `fa-solid ${getWeatherIcon(code, isDay)} text-2xl accent-sky`;
            }
        } catch (e) {
            console.warn('Weather fetch failed:', e);
        }
    }

    function getWeatherIcon(code, isDay) {
        const icons = {
            0: isDay ? 'fa-sun' : 'fa-moon',
            1: isDay ? 'fa-sun' : 'fa-moon',
            2: 'fa-cloud', 3: 'fa-cloud',
            45: 'fa-smog', 48: 'fa-smog',
            51: 'fa-cloud-rain', 53: 'fa-cloud-rain', 55: 'fa-cloud-rain',
            61: 'fa-cloud-showers-heavy', 63: 'fa-cloud-showers-heavy', 65: 'fa-cloud-showers-heavy',
            71: 'fa-snowflake', 73: 'fa-snowflake', 75: 'fa-snowflake',
            80: 'fa-cloud-showers-heavy', 81: 'fa-cloud-showers-heavy', 82: 'fa-cloud-showers-heavy',
            95: 'fa-bolt', 96: 'fa-bolt', 99: 'fa-bolt'
        };
        return icons[code] || 'fa-cloud';
    }

    // ==================== SOCKET LISTENERS ====================
    socket.on('state_update', (newState) => {
        currentState = newState;
        if (newState.kitchen_panel_mode) currentModes.kitchen_panel = newState.kitchen_panel_mode;
        if (newState.awning_mode) currentModes.awning = newState.awning_mode;
        updateUIFromState();
    });

    socket.on('reed_update', (payload) => {
        currentReeds = { ...(payload.states || {}), ...(payload.forced || {}) };
        updateRooftopTentControls();
    });

    socket.on('sensor_update', updateSensors);
    socket.on('gps_update', updateGPS);

    // ==================== SCENES ====================
    function setScene(scene) {
        console.log('🎬 Scene activated:', scene);

        document.querySelectorAll('.scene-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.scene === scene);
        });

        setTimeout(() => {
            document.querySelectorAll('.scene-btn').forEach(btn => btn.classList.remove('active'));
        }, 750);

        socket.emit('set_scene', { scene });
    }

    // ==================== INIT ====================
    window.onload = function() {
        renderLightingControls();
        
        updateClock();
        setInterval(updateClock, 10000);
		
        setTimeout(() => {
            if (Object.keys(currentState).length) updateUIFromState();
        }, 600);

        document.querySelectorAll('.scene-btn').forEach(btn => {
            btn.addEventListener('click', () => setScene(btn.dataset.scene));
        });

        console.log("🚀 PCCS Frontend Ready to go");
    };

    // ====================== TOAST SYSTEM ======================
	function createToast(data) {
		const { id, message, type = "info", duration = 5000, title, persistent = false } = data;

		const container = document.getElementById('toast-container');
		if (!container) return;

		let icon = 'fa-info-circle';
		if (type === 'success') icon = 'fa-check-circle';
		else if (type === 'warning') icon = 'fa-exclamation-triangle';
		else if (type === 'error') icon = 'fa-circle-xmark';

		const toast = document.createElement('div');
		toast.className = `toast toast-${type}`;
		toast.id = id || 'toast-' + Date.now();

		toast.innerHTML = `
			<i class="fa-solid ${icon} text-2xl flex-shrink-0"></i>
			<div class="toast-content flex-1 min-w-0">
				${title ? `<div class="toast-title">${title}</div>` : ''}
				<div class="toast-message">${message}</div>
			</div>
			<button class="text-xl leading-none" aria-label="Close">
				<i class="fa-solid fa-xmark"></i>
			</button>
		`;

		container.appendChild(toast);

		// Better fade-in for Safari + Firefox
		requestAnimationFrame(() => {
			requestAnimationFrame(() => {
				toast.classList.add('show');
			});
		});

		// Close button
		const closeBtn = toast.querySelector('button');
		closeBtn.addEventListener('click', () => dismissToast(toast));

		// Click anywhere on toast to dismiss
		toast.addEventListener('click', (e) => {
			if (e.target.tagName !== 'BUTTON' && !e.target.closest('button')) {
				dismissToast(toast);
			}
		});

		// Auto dismiss
		if (!persistent && duration > 0) {
			setTimeout(() => {
				dismissToast(toast);
			}, duration);
		}

		return toast;
	}

	function dismissToast(toast) {
		if (!toast || !toast.parentNode) return;
		
		toast.style.transition = 'opacity 0.95s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.95s cubic-bezier(0.25, 0.1, 0.25, 1)';
		toast.style.opacity = '0';
		toast.style.transform = 'translateY(12px)';

		toast.addEventListener('transitionend', () => {
			if (toast.parentNode) toast.parentNode.removeChild(toast);
		}, { once: true });
	}

    // ====================== SOCKET LISTENER ======================
    socket.on('toast', function(data) {
        console.log('🧪 Toast received:', data.type, '-', data.message?.substring(0, 80));
        createToast(data);
    });

</script>
