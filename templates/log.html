<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pissmole Logs</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #header {
            background: #007acc;
            color: white;
            padding: 10px;
            margin: -10px -10px 10px -10px;
            text-align: center;
            font-size: 1.2em;
        }
        #controls {
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 6px 12px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #555; }
        #log-container {
            flex: 1;
            overflow-y: auto;
            background: #252526;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.95em;
            line-height: 1.4;
            white-space: pre-wrap;
        }
        .log-line { margin: 1px 0; }
        .DEBUG { color: #6e9cff; }
        .INFO  { color: #a0e68a; }
        .WARNING { color: #ffcc66; }
        .ERROR, .CRITICAL { color: #ff6666; font-weight: bold; }
        #clear { background: #c42b1c; }
    </style>
</head>
<body>
    <div id="header">🚐 Pissmole Camper — Live Logs</div>
    
    <div id="controls">
        <button onclick="clearLogs()">Clear</button>
        <button onclick="togglePause()">⏸️ Pause</button>
        <span id="status" style="margin-left:auto; color:#888;">Connected</span>
    </div>

    <div id="log-container"></div>

    <script>
	
		socket.on('connect_error', (err) => {
			console.error('Socket error:', err);
			document.getElementById('status').textContent = '❌ Connection Error';
			document.getElementById('status').style.color = 'red';
		});
        const socket = io();
        let paused = false;
        let logContainer = document.getElementById('log-container');

        function addLog(data) {
            if (paused) return;
            
            const div = document.createElement('div');
            div.className = `log-line ${data.level}`;
            div.textContent = data.full || `[${data.timestamp}] ${data.level}: ${data.message}`;
            logContainer.appendChild(div);
            
            // Auto-scroll (keep last 1000 lines)
            if (logContainer.children.length > 1000) {
                logContainer.removeChild(logContainer.children[0]);
            }
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        socket.on('new_log', (data) => {
            addLog(data);
        });

        socket.on('connect', () => {
            document.getElementById('status').textContent = '🟢 Connected';
            document.getElementById('status').style.color = '#4caf50';
        });

        socket.on('disconnect', () => {
            document.getElementById('status').textContent = '🔴 Disconnected';
            document.getElementById('status').style.color = '#ff6666';
        });

        function clearLogs() {
            logContainer.innerHTML = '';
        }

        let isPaused = false;
        function togglePause() {
            isPaused = !isPaused;
            const btn = document.querySelector('button[onclick="togglePause()"]');
            btn.textContent = isPaused ? '▶️ Resume' : '⏸️ Pause';
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.key === 'c' && e.ctrlKey) clearLogs();
            if (e.key === 'p') togglePause();
        });

        // Initial welcome
        setTimeout(() => {
            addLog({
                timestamp: new Date().toLocaleTimeString(),
                level: 'INFO',
                full: '📡 Log viewer ready — new logs will appear here in real time.'
            });
        }, 500);
    </script>
</body>
</html>
